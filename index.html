<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Container - TL Edition</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            background: #1b1b1b; 
        }
        header { 
            background: #282828; 
            color: #ff9900; 
            padding: 12px; 
            text-align: center; 
            border-bottom: 2px solid #ff9900;
            font-weight: bold;
        }
        .controls { 
            padding: 15px; 
            background: #333; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            gap: 12px; 
        }
        input[type="text"] { 
            flex-grow: 1; 
            max-width: 600px;
            padding: 10px; 
            border: 1px solid #444; 
            border-radius: 4px; 
            background: #222; 
            color: #eee;
            outline: none;
        }
        button { 
            padding: 10px 20px; 
            background: #ff9900; 
            color: black; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: bold;
            transition: background 0.3s;
        }
        button:hover { background: #e68a00; }
        .iframe-container {
            flex-grow: 1;
            position: relative;
            background: #000;
        }
        iframe { 
            position: absolute;
            top: 0; left: 0;
            width: 100%; 
            height: 100%; 
            border: none; 
        }
    </style>
</head>
<body>

<header>
    CONTAINER PRO -- Powered By TL
</header>

<div class="controls">
    <input type="text" id="urlInput" placeholder="输入代理地址..." value="https://webp.forbiddenx.top/https://cn.pornhub.com/">
    <button onclick="reloadIframe()">立即跳转</button>
</div>

<div class="iframe-container">
    <iframe id="myFrame" src="https://webp.forbiddenx.top/https://cn.pornhub.com/" allowfullscreen></iframe>
</div>

<script>
    // 点击按钮跳转
    function reloadIframe() {
        const iframe = document.getElementById('myFrame');
        const url = document.getElementById('urlInput').value;
        if(url) {
            iframe.src = url;
        }
    }

    // 监听回车键
    document.getElementById('urlInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            reloadIframe();
        }
    });
</script>

</body>
</html>
