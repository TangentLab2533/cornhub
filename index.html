<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pornhub</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: #4285f4; color: white; padding: 10px; text-align: center; }

</header>

<div class="controls">

</div>

<!-- 这里的 google 链接加了 ?igu=1 是以前的一个小技巧，但现在基本失效 -->
<iframe id="myFrame" src="https://webp.forbiddenx.top/https://cn.pornhub.com/"></iframe>

<script>
    function reloadIframe() {
        const iframe = document.getElementById('myFrame');

    }
